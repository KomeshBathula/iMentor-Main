# ─────────────────────────────────────────────────────────────────────────────
# Chatbot AutoResearch — Docker Compose 
# Re-configured linearly to avoid port & volume collisions with the primary app.
# Hosts an isolated swarm environment.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  mongo:
    image: mongo:7
    container_name: chatbot-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017" # Shifted from 27017 — localhost only
    volumes:
      - chatbot_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379" # Shifted from 6379 — localhost only
    volumes:
      - chatbot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: chatbot-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7475:7474"   # Shifted from 7474 — localhost only
      - "127.0.0.1:7688:7687"   # Shifted from 7687 — localhost only
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      # Community Edition only supports the default 'neo4j' database.
      # Do NOT set NEO4J_DATABASE to anything other than 'neo4j' in server/.env.
    volumes:
      - chatbot_neo4j_data:/data
      - chatbot_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6335:6333"   # Shifted from 6333 — localhost only
      - "127.0.0.1:6336:6334"   # Shifted from 6334 — localhost only
    volumes:
      - chatbot_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: chatbot-elastic
    restart: unless-stopped
    ports:
      - "127.0.0.1:9201:9200"   # Shifted from 9200 — localhost only
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - chatbot_elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # SGLANG — LLM Inference Server (GPU)
  # ═══════════════════════════════════════════════════════════════════════════
  # Qwen2.5-7B-AWQ on RTX A4000 16GB: ~4.5GB weights + ~3GB KV = ~7-8GB VRAM
  # Exposes OpenAI-compatible API on port 8000

  sglang:
    image: lmsysorg/sglang:latest
    container_name: chatbot-sglang
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:30000"   # LLM inference — localhost only
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "sglang.launch_server",
      "--model-path", "Qwen/Qwen2.5-7B-Instruct-AWQ",
      "--quantization", "awq",
      "--host", "0.0.0.0",
      "--port", "30000",
      "--mem-fraction-static", "0.88",
      "--context-length", "8192",
      "--chunked-prefill-size", "512",
      "--max-running-requests", "4",
      "--schedule-policy", "lpm"
    ]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:30000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # MONITORING
  # ═══════════════════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: chatbot-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"   # localhost only
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - chatbot_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: chatbot-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"   # localhost only
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - chatbot_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: chatbot-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:5005:5005"   # Shifted from 5001 — nginx proxies externally
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/chatbot_autoresearch
      REDIS_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: neo4j
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SGLANG_ENABLED: "true"
      # Point to host's SGLang server across OS layer boundary
      SGLANG_CHAT_URL: http://host.docker.internal:8000/v1
      SGLANG_REASON_URL: http://host.docker.internal:8000/v1
      SGLANG_HEAVY_URL: http://host.docker.internal:8000/v1
      USE_CREWAI_RESEARCH: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    working_dir: /app/server
    command: ["node", "server.js"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: chatbot-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"   # Shifted from 3000 — nginx proxies externally
    working_dir: /app/frontend
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "3005"]

  # ═══════════════════════════════════════════════════════════════════════════
  # NGINX REVERSE PROXY 
  # ═══════════════════════════════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: chatbot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"     # Shifted from 80
      - "8443:443"    # Shifted from 443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - frontend
    profiles:
      - production

# ═══════════════════════════════════════════════════════════════════════════
# NAMED VOLUMES
# ═══════════════════════════════════════════════════════════════════════════

volumes:
  chatbot_mongo_data:
  chatbot_redis_data:
  chatbot_neo4j_data:
  chatbot_neo4j_logs:
  chatbot_qdrant_data:
  chatbot_elastic_data:
  chatbot_prometheus_data:
  chatbot_grafana_data:
  huggingface_cache:
