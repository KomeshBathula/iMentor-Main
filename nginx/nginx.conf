# =============================================================
# iMentor — Nginx Reverse Proxy Configuration
# =============================================================
# In Docker: mounted at /etc/nginx/nginx.conf
# Standalone: copy to your nginx conf directory
# =============================================================

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # --- Max upload size (matches Express's 10mb limit) ---
    client_max_body_size 10m;

    # Upstream definitions for backend services
    upstream node_backend {
        server server:5001;      # Node.js Express server
    }

    upstream rag_service {
        server rag:2001;         # Python RAG service
    }

    upstream socratic_service {
        server socratic:2002;    # Python Socratic service
    }

    upstream frontend_dev {
        server frontend:3000;    # Vite dev server
    }

    server {
        listen       8085;
        server_name  localhost;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # --- Logging ---
        access_log  logs/imentor_access.log;
        error_log   logs/imentor_error.log;

        # ==========================================================
        # 1. FRONTEND - Serve React static files
        # ==========================================================
        # In production: serve built static files
        # root  /app/frontend/dist;
        # index index.html;

        # In development: proxy to Vite dev server
        location / {
            proxy_pass http://frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ==========================================================
        # 2. NODE.JS BACKEND API - Reverse Proxy
        # ==========================================================
        location /api/ {
            proxy_pass http://node_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running AI requests
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ==========================================================
        # 3. WEBSOCKET SUPPORT (Socket.io)
        # ==========================================================
        location /socket.io/ {
            proxy_pass http://node_backend;
            proxy_http_version 1.1;

            # Required headers for WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ==========================================================
        # 4. PYTHON RAG SERVICE - Reverse Proxy
        # ==========================================================
        location /rag/ {
            rewrite ^/rag/(.*) /$1 break;
            proxy_pass http://rag_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ==========================================================
        # 4b. PYTHON SOCRATIC SERVICE - Reverse Proxy
        # ==========================================================
        location /socratic/ {
            rewrite ^/socratic/(.*) /$1 break;
            proxy_pass http://socratic_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ==========================================================
        # 5. PROMETHEUS METRICS
        # ==========================================================
        location /metrics {
            proxy_pass http://node_backend/metrics;
        }

        # --- Deny access to hidden files ---
        location ~ /\. {
            deny all;
        }

        # --- Error pages ---
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
