# =============================================================
# iMentor — Nginx Reverse Proxy Configuration  (CANONICAL)
# =============================================================
# Deployed to: /etc/nginx/sites-available/000-unified
# Symlinked:   /etc/nginx/sites-enabled/000-unified
#
# Service ports (defined in startup.sh, must stay in sync):
#   Frontend (Vite):           3005
#   Backend  (Node.js):        5005
#   RAG      (Python/FastAPI): 2005
#   Interactive Learning tool: 9845  (legacy, keep for reference)
#
# Server IPs:
#   Public:   61.0.228.124
#   Internal: 172.180.14.125
#
# SSL certificates stored in:
#   nginx/certs/interactive-learning.crt  (public cert — versioned here)
#   nginx/certs/interactive-learning.key  ← PRIVATE KEY — never commit;
#                                            copy manually from backup or
#                                            regenerate with gen-selfsigned.sh
# =============================================================

# ── Upstream: iMentor services ─────────────────────────────────────────
upstream imentor_frontend {
    server 127.0.0.1:3005;   # React/Vite dev server
    keepalive 32;
}

upstream imentor_backend {
    server 127.0.0.1:5005;   # Node.js Express API
    keepalive 32;
}

upstream imentor_rag {
    server 127.0.0.1:2005;   # Python RAG FastAPI service
    keepalive 32;
}

# ── Upstream: legacy Interactive Learning tool ─────────────────────────
upstream interactive_learning {
    server 127.0.0.1:9845;   # Next.js ML visualisation app
    keepalive 64;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 61.0.228.124 172.180.14.125 localhost;

    return 301 https://$host$request_uri;
}

# ── Main HTTPS server block ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 2000 ssl;          # Alternate SSL port (legacy clients)
    listen [::]:2000 ssl;

    server_name 61.0.228.124 172.180.14.125 localhost;

    # ── SSL ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/interactive-learning.crt;
    ssl_certificate_key /etc/ssl/private/interactive-learning.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 100M;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/imentor_access.log;
    error_log  /var/log/nginx/imentor_error.log;

    # ── Health / test endpoint ────────────────────────────────────────
    location /testaddr {
        default_type text/plain;
        return 200 "iMentor Platform is running!\nRequest URI: $request_uri\nRemote Address: $remote_addr\nServer: $server_name\n";
    }

    # ==========================================================
    # 1. BACKEND API (/api/) — SSE + WebSocket streaming
    # ==========================================================
    location /api/ {
        proxy_pass http://imentor_backend/api/;
        proxy_http_version 1.1;

        # CRITICAL: SSE streaming ("Thinking Process" animation)
        proxy_set_header X-Accel-Buffering "no";
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header Connection "";

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for AI inference
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ==========================================================
    # 2. RAG SERVICE (/rag/)
    # ==========================================================
    location /rag/ {
        proxy_pass http://imentor_rag/;
        proxy_http_version 1.1;

        # SSE for RAG document-processing streams
        proxy_set_header X-Accel-Buffering "no";
        proxy_set_header Cache-Control "no-cache";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }

    # ==========================================================
    # 3. SOCKET.IO — persistent WebSocket connections
    # ==========================================================
    location /socket.io/ {
        proxy_pass http://imentor_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==========================================================
    # 4. PROMETHEUS METRICS
    # ==========================================================
    location /metrics {
        proxy_pass http://imentor_backend/metrics;
    }

    # ==========================================================
    # 5. INTERACTIVE LEARNING TOOL (/interactive-learning/)
    # ==========================================================
    location /interactive-learning/ {
        proxy_pass http://interactive_learning/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ── Deny dotfiles ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ==========================================================
    # 6. FRONTEND — must be the LAST location block
    # ==========================================================
    location / {
        proxy_pass http://imentor_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";   # Vite HMR
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Error pages ───────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
