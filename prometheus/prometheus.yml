# prometheus/prometheus.yml

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node.js Express backend (port 5001)
  - job_name: 'nodejs_backend'
    static_configs:
      - targets: ['host.docker.internal:5001']

  # Python RAG service (port 2001)
  - job_name: 'python_rag_service'
    static_configs:
      - targets: ['host.docker.internal:2001']

  # Python Socratic service (port 2002)
  - job_name: 'python_socratic_service'
    static_configs:
      - targets: ['host.docker.internal:2002']